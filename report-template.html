<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{REPORT_TITLE}}</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --muted: #666666;
      --accent: #2d9162;
      --accent-mid: #52b788;
      --accent-light: #d8f0e3;
      --warn: #9a6a00;
      --warn-bg: #fff3cd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.65; }
    a { color: inherit; }
    .hero { background: linear-gradient(135deg,#1a6b48 0%,var(--accent) 60%,var(--accent-mid) 100%); color:#fff; padding:48px 32px 36px; text-align:center; }
    .hero-label { font-size:12px; letter-spacing:2px; text-transform:uppercase; opacity:.78; margin-bottom:10px; }
    .hero h1 { font-size:26px; font-weight:800; line-height:1.3; margin-bottom:8px; }
    .hero-sub { font-size:13px; opacity:.9; margin:0 auto 28px; max-width:760px; }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; max-width:900px; margin:0 auto; }
    .stat { background:rgba(255,255,255,.15); border-radius:12px; padding:16px 12px; min-height:92px; display:flex; flex-direction:column; justify-content:center; }
    .stat-num { font-size:24px; font-weight:800; line-height:1.2; overflow-wrap:anywhere; }
    .stat-label { font-size:11px; opacity:.88; margin-top:6px; line-height:1.35; }
    .container { max-width:900px; margin:0 auto; padding:32px 20px 60px; }
    .section { background:var(--surface); border-radius:16px; padding:28px; margin-bottom:24px; }
    .sec-head { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
    .sec-num { width:36px; height:36px; border-radius:50%; background:var(--accent); color:#fff; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .sec-title { font-size:18px; font-weight:700; flex:1; min-width:0; }
    .evidence-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:10px; }
    .time-link, .source-chip { display:inline-flex; align-items:center; gap:5px; border-radius:999px; padding:4px 10px; font-size:12px; font-weight:700; text-decoration:none; white-space:nowrap; transition:background .15s,color .15s,border-color .15s; }
    .time-link { color:var(--accent); background:var(--accent-light); }
    .time-link::before { content:"\25B6"; font-size:10px; }
    .time-link:hover { background:var(--accent); color:#fff; }
    .source-chip { color:var(--accent); background:#fff; border:1px solid var(--accent-mid); }
    .source-chip:hover { background:var(--accent-light); }
    .source-chip.needs-review { color:var(--warn); background:var(--warn-bg); border-color:#f0cf75; }
    table { width:100%; border-collapse:collapse; font-size:14px; overflow-wrap:anywhere; }
    th { background:var(--accent); color:#fff; padding:10px 14px; text-align:left; font-weight:700; }
    td { padding:10px 14px; border-bottom:1px solid var(--border); vertical-align:top; }
    tr:last-child td { border-bottom:none; }
    tr:nth-child(even) td { background:#f9fffe; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .card { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:18px; }
    .card-title { font-size:14px; font-weight:700; color:var(--accent); margin-bottom:8px; }
    .card-body { font-size:13px; color:var(--text); line-height:1.6; }
    .timeline { display:grid; gap:12px; }
    .timeline-item { background:#fff; border:1px solid var(--border); border-left:4px solid var(--accent); border-radius:10px; padding:16px; }
    .timeline-meta { font-size:12px; color:var(--muted); margin-bottom:5px; }
    .timeline-title { font-size:15px; font-weight:800; margin-bottom:6px; }
    .insight { border-left:4px solid var(--accent); background:var(--accent-light); border-radius:0 10px 10px 0; padding:14px 18px; margin:14px 0 0; font-size:14px; }
    .insight strong { color:var(--accent); }
    .source-map { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .source-list { background:#fff; border:1px solid var(--border); border-radius:12px; padding:18px; }
    .source-list h4 { color:var(--accent); font-size:14px; margin-bottom:10px; }
    .source-list li { list-style:none; border-bottom:1px solid var(--border); padding:8px 0; font-size:13px; }
    .source-list li:last-child { border-bottom:none; }
    .footer { background:var(--surface); border-top:1px solid var(--border); padding:20px 32px; text-align:center; font-size:12px; color:var(--muted); }
    .footer a { color:var(--accent); text-decoration:none; }
    @media (max-width:760px) {
      .stats { grid-template-columns:repeat(2,1fr); }
      .grid { grid-template-columns:repeat(2,1fr); }
      .source-map { grid-template-columns:1fr; }
      .section { padding:22px; }
    }
    @media (max-width:520px) {
      body { font-size:14px; }
      .hero { padding:38px 20px 30px; }
      .hero h1 { font-size:20px; }
      .stats, .grid { grid-template-columns:1fr; }
      .sec-head { align-items:flex-start; }
      .sec-title { font-size:16px; }
      table { display:block; overflow-x:auto; white-space:nowrap; }
      th, td { padding:9px 10px; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-label">{{REPORT_LABEL}}</div>
    <h1>{{REPORT_HEADING}}</h1>
    <div class="hero-sub">{{REPORT_THESIS}}</div>
    <div class="stats">
      {{STAT_CARDS}}
    </div>
  </div>

  <main class="container">
    {{REPORT_SECTIONS}}
  </main>

  <footer class="footer">
    <div>주요 출처: {{PRIMARY_SOURCE_LINK}}</div>
    <div style="margin-top:6px;">생성일: {{GENERATED_DATE}} | Evidence-aware Korean report</div>
  </footer>
</body>
</html>
